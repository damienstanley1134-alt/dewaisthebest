<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hidden Message</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffe6e6;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }

    .heart {
      width: 100px;
      height: 100px;
      background: red;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .heart:hover {
      transform: rotate(-45deg) scale(1.1);
    }

    .heart::before,
    .heart::after {
      content: "";
      width: 100px;
      height: 100px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }

    .heart::before {
      top: -50px;
      left: 0;
    }

    .heart::after {
      left: 50px;
      top: 0;
    }

    .message {
      margin-top: 30px;
      font-size: 24px;
      color: #b30000;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="heart" onclick="revealMessage()"></div>

  <div id="message" class="message">hey dewa, can i get head.</div>

  <script>
    function revealMessage() {
      const msg = document.getElementById('message');
      msg.classList.add('show');
    }
  </script>

</body>
</html>
