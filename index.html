<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hidden Message</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffe6e6;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 20px;
      color: #cc0000;
    }

    .heart {
      width: 100px;
      height: 100px;
      background: red;
      position: relative;
      transform: rotate(-45deg);
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.2); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    .heart::before,
    .heart::after {
      content: "";
      width: 100px;
      height: 100px;
      background: red;
      border-radius: 50%;
      position: absolute;
    }

    .heart::before {
      top: -50px;
      left: 0;
    }

    .heart::after {
      left: 50px;
      top: 0;
    }

    .message {
      margin-top: 30px;
      font-size: 24px;
      color: #b30000;
      border-right: 2px solid #b30000;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }
  </style>
</head>
<body>

  <h1>Click Me</h1>

  <div class="heart" onclick="revealMessage()"></div>

  <div id="message" class="message"></div>

  <script>
    const text = "hello dewaaaaaaa...... can i get head please?";
    let index = 0;

    function typeWriter() {
      if (index < text.length) {
        document.getElementById("message").textContent += text.charAt(index);
        index++;
        setTimeout(typeWriter, 80);
      }
    }

    function revealMessage() {
      const msg = document.getElementById('message');
      msg.style.width = 'auto';
      msg.textContent = '';
      index = 0;
      typeWriter();
    }
  </script>

</body>
</html>
